<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 224 50" fill="none" role="img" aria-label="avantis">
  <!--
    Approximation of the Avantis brand mark (rolling-wave M) + wordmark.
    Drop the OFFICIAL svg/png in here at the same filename to swap exactly.
    Aspect ratio is 224:50 (~4.5:1); consumers use Next/Image with
    matching width:height props so the substitute should keep similar ratio.
  -->
  <g fill="#ffffff">
    <!-- Left wave: smooth dome with hollow inner crest -->
    <path d="M 4 46 Q 4 4 26 4 Q 48 4 48 46 L 39 46 Q 39 18 26 18 Q 13 18 13 46 Z"/>
    <!-- Right wave: overlapping dome forming the M silhouette -->
    <path d="M 44 46 Q 44 4 66 4 Q 88 4 88 46 L 79 46 Q 79 18 66 18 Q 53 18 53 46 Z"/>
  </g>
  <text x="100" y="38"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="36" font-weight="600" letter-spacing="-1.4" fill="#ffffff">avantis</text>
</svg>
